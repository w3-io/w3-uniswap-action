# E2E Test Workflow
# Recovery: all write tests round-trip to recover funds. Only gas is consumed.
#
# Exercises every command against real APIs/contracts.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "Uniswap E2E" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_ETHEREUM (bridge signer with ETH + tokens on Base)
#
# Addresses (Base mainnet):
#   WETH:  0x4200000000000000000000000000000000000006
#   USDC:  0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913
#   USDbC: 0xd9aAEc86B65D86f6A7B5B1b0c42FFA531710b6CA

name: Uniswap E2E
on:
  workflow_dispatch: {}

jobs:
  # ── Read-only: quote ────────────────────────────────────────────
  quote:
    runs-on: ubuntu-latest
    steps:
      # Quote: 0.001 WETH -> USDC on Base (500 fee tier)
      - uses: w3-io/w3-uniswap-action@main
        id: quote
        with:
          command: quote
          chain: base
          token-in: '0x4200000000000000000000000000000000000006'
          token-out: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
          fee: '500'
          amount-in: '1000000000000000'

      - run: |
          echo "=== Quote ==="
          echo "${{ steps.quote.outputs.result }}"

  # ── Write: swap + multi-hop-swap ────────────────────────────────
  swaps:
    runs-on: ubuntu-latest
    steps:
      # 1. Swap 0.0001 WETH -> USDC
      - uses: w3-io/w3-uniswap-action@main
        id: swap
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: swap
          chain: base
          token-in: '0x4200000000000000000000000000000000000006'
          token-out: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
          fee: '500'
          amount-in: '100000000000000'
          amount-out-minimum: '0'
          recipient: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      # 2. Recovery: reverse swap USDC -> WETH (same amount out from step 1)
      - uses: w3-io/w3-uniswap-action@main
        id: swap-reverse
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: swap
          chain: base
          token-in: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
          token-out: '0x4200000000000000000000000000000000000006'
          fee: '500'
          amount-in: ${{ fromJSON(steps.swap.outputs.result).amountOut }}
          amount-out-minimum: '0'
          recipient: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      # 3. Multi-hop swap: WETH -> USDC -> USDbC
      - uses: w3-io/w3-uniswap-action@main
        id: multi-hop
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: multi-hop-swap
          chain: base
          path: '[{"token":"0x4200000000000000000000000000000000000006","fee":500},{"token":"0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913","fee":100},{"token":"0xd9aAEc86B65D86f6A7B5B1b0c42FFA531710b6CA"}]'
          amount-in: '100000000000000'
          amount-out-minimum: '0'
          recipient: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      # 4. Recovery: reverse multi-hop USDbC -> USDC -> WETH
      - uses: w3-io/w3-uniswap-action@main
        id: multi-hop-reverse
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: multi-hop-swap
          chain: base
          path: '[{"token":"0xd9aAEc86B65D86f6A7B5B1b0c42FFA531710b6CA","fee":100},{"token":"0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913","fee":500},{"token":"0x4200000000000000000000000000000000000006"}]'
          amount-in: ${{ fromJSON(steps.multi-hop.outputs.result).amountOut }}
          amount-out-minimum: '0'
          recipient: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      - run: |
          echo "=== Swap ==="
          echo "${{ steps.swap.outputs.result }}"
          echo "=== Swap Reverse ==="
          echo "${{ steps.swap-reverse.outputs.result }}"
          echo "=== Multi-Hop Swap ==="
          echo "${{ steps.multi-hop.outputs.result }}"
          echo "=== Multi-Hop Reverse ==="
          echo "${{ steps.multi-hop-reverse.outputs.result }}"

  # ── Write: liquidity lifecycle ──────────────────────────────────
  # mint -> get-position -> increase-liquidity -> decrease-liquidity -> collect
  liquidity:
    runs-on: ubuntu-latest
    steps:
      # 1. Mint a new position (WETH/USDC, 500 fee, narrow range)
      - uses: w3-io/w3-uniswap-action@main
        id: mint
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: mint
          chain: base
          token-in: '0x4200000000000000000000000000000000000006'
          token-out: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
          fee: '500'
          tick-lower: '-887220'
          tick-upper: '887220'
          amount0-desired: '100000000000000'
          amount1-desired: '100000'
          amount0-min: '0'
          amount1-min: '0'
          recipient: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      # 2. Get the minted position
      - uses: w3-io/w3-uniswap-action@main
        id: get-position
        with:
          command: get-position
          chain: base
          token-id: ${{ fromJSON(steps.mint.outputs.result).tokenId }}

      # 3. Increase liquidity on the position
      - uses: w3-io/w3-uniswap-action@main
        id: increase
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: increase-liquidity
          chain: base
          token-id: ${{ fromJSON(steps.mint.outputs.result).tokenId }}
          amount0-desired: '50000000000000'
          amount1-desired: '50000'
          amount0-min: '0'
          amount1-min: '0'

      # 4. Get position after increase (to know total liquidity)
      - uses: w3-io/w3-uniswap-action@main
        id: get-position-after
        with:
          command: get-position
          chain: base
          token-id: ${{ fromJSON(steps.mint.outputs.result).tokenId }}

      # 5. Decrease ALL liquidity (recovery: remove everything)
      - uses: w3-io/w3-uniswap-action@main
        id: decrease
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: decrease-liquidity
          chain: base
          token-id: ${{ fromJSON(steps.mint.outputs.result).tokenId }}
          liquidity: ${{ fromJSON(steps.get-position-after.outputs.result).liquidity }}

      # 6. Collect all tokens (recovery: returns both tokens to wallet)
      - uses: w3-io/w3-uniswap-action@main
        id: collect
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow:
          - ethereum/call-contract
        with:
          command: collect
          chain: base
          token-id: ${{ fromJSON(steps.mint.outputs.result).tokenId }}
          recipient: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      - run: |
          echo "=== Mint ==="
          echo "${{ steps.mint.outputs.result }}"
          echo "=== Get Position ==="
          echo "${{ steps.get-position.outputs.result }}"
          echo "=== Get Position After Increase ==="
          echo "${{ steps.get-position-after.outputs.result }}"
          echo "=== Increase Liquidity ==="
          echo "${{ steps.increase.outputs.result }}"
          echo "=== Decrease Liquidity ==="
          echo "${{ steps.decrease.outputs.result }}"
          echo "=== Collect ==="
          echo "${{ steps.collect.outputs.result }}"
